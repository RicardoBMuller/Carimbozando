<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#2ecc71">
    <meta name="description" content="Ouça Carimbozando com letras, playlist, modo app e instalação na tela inicial.">
    <meta name="application-name" content="Carimbozando">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Carimbozando">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Ispótifai – Carimbozando</title>

    <link rel="manifest" href="manifest.webmanifest">
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Patrick+Hand&display=swap" rel="stylesheet">

    <style>
        :root {
            --green: #2ecc71;
            --orange: #ff9f43;
            --blue: #48dbfb;
            --pink: #fd79a8;
            --stroke: #1a1a1a;
            --card: rgba(255,251,240,0.93);
            --card-solid: #fffbf0;
            --border: 2.5px solid var(--stroke);
            --shadow: 7px 7px 0 rgba(0,0,0,0.17);
            --shadow-soft: 0 24px 60px rgba(0,0,0,0.14);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh; min-height: 100dvh;
            font-family: 'Patrick Hand', cursive;
            color: var(--stroke);
            overflow-x: hidden;
            display: flex; flex-direction: column; align-items: center;
            padding: max(16px, env(safe-area-inset-top)) 14px max(20px, env(safe-area-inset-bottom));
            -webkit-tap-highlight-color: transparent;
            position: relative;
        }

        .bg {
            position: fixed; inset: 0; z-index: 0;
            background: linear-gradient(135deg, #74ebd5 0%, #ACB6E5 50%, #74ebd5 100%);
            background-size: 300% 300%;
            animation: bgMove 14s ease infinite;
        }
        @keyframes bgMove { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }

        .notes { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
        .note { position: absolute; opacity: 0; animation: floatUp linear infinite; user-select: none; }
        @keyframes floatUp {
            0%   { opacity: 0; transform: translateY(20px) rotate(-10deg); }
            15%  { opacity: 0.6; }
            85%  { opacity: 0.3; }
            100% { opacity: 0; transform: translateY(-110vh) rotate(30deg); }
        }

        .layout { position: relative; z-index: 1; width: 100%; max-width: 420px; display: flex; flex-direction: column; gap: 13px; }

        .top-bar { display: flex; align-items: center; justify-content: space-between; animation: fadeDown .45s ease both; }
        @keyframes fadeDown { from{opacity:0;transform:translateY(-14px)} to{opacity:1;transform:none} }

        .brand { display: flex; align-items: center; gap: 9px; }
        .brand-icon {
            width: 42px; height: 42px;
            background: linear-gradient(155deg, #55e89c, var(--green));
            border-radius: 50%; border: var(--border);
            display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 4.5px;
            box-shadow: 3px 3px 0 rgba(0,0,0,0.1);
            animation: sway 7s ease-in-out infinite;
        }
        @keyframes sway { 0%,100%{transform:rotate(-4deg)} 50%{transform:rotate(4deg)} }
        .wave-line { background: transparent; border-top: 2.5px solid var(--stroke); border-radius: 50%; }
        .w1{width:46%} .w2{width:66%} .w3{width:40%}

        .brand-name {
            font-family: 'Fredoka', sans-serif; font-size: 1.95rem; font-weight: 700;
            color: var(--orange); -webkit-text-stroke: 1.2px var(--stroke);
            text-shadow: 3px 3px 0 rgba(0,0,0,0.09);
            letter-spacing: 0.5px;
        }

        .install-chip {
            display: inline-flex; align-items: center; gap: 7px;
            padding: 9px 15px; border-radius: 999px; border: var(--border);
            background: rgba(255,255,255,0.7); backdrop-filter: blur(10px);
            box-shadow: var(--shadow); font-family: 'Fredoka', sans-serif;
            font-size: .86rem; font-weight: 600; cursor: pointer;
            transition: transform .18s ease, box-shadow .18s ease, background .18s ease;
            white-space: nowrap; color: var(--stroke);
        }
        .install-chip.hidden { display: none; }

        .player-card {
            background: var(--card); backdrop-filter: blur(18px);
            border-radius: 32px; border: var(--border);
            box-shadow: var(--shadow), var(--shadow-soft);
            padding: 22px 20px 20px;
            position: relative; overflow: hidden;
            animation: slideUp .6s cubic-bezier(.22,.61,.36,1) both .08s;
        }
        @keyframes slideUp { from{opacity:0;transform:translateY(28px) scale(.97)} to{opacity:1;transform:none} }

        .cover-area { position: relative; width: 100%; aspect-ratio: 1; margin-bottom: 18px; }
        .ring {
            position: absolute; inset: -9px; border-radius: 50%;
            background: conic-gradient(from 0deg, var(--green) 0%, var(--blue) 33%, var(--orange) 66%, var(--pink) 85%, var(--green) 100%);
            opacity: 0; transition: opacity .5s ease;
            animation: spin 6s linear infinite;
        }
        .ring.on { opacity: 1; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .disc {
            position: relative; z-index: 1; width: 100%; height: 100%;
            border-radius: 50%; border: var(--border); overflow: hidden;
            box-shadow: var(--shadow), 0 0 0 7px var(--card);
            transition: border-radius .45s cubic-bezier(.22,.61,.36,1);
        }
        .disc.flat { border-radius: 24px; }
        .disc img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform .45s ease; }
        .disc.spinning img { animation: vinylSpin 8s linear infinite; }
        @keyframes vinylSpin { to { transform: rotate(360deg); } }

        .lyrics-panel {
            position: absolute; inset: 0; border-radius: inherit; z-index: 10;
            background: rgba(255,251,240,.97); display: flex; flex-direction: column; padding: 16px;
            opacity: 0; pointer-events: none; transition: opacity .25s ease;
        }
        .lyrics-panel.show { opacity: 1; pointer-events: auto; }
        .lyrics-scroll { flex: 1; overflow-y: auto; text-align: center; font-size: 1.04rem; line-height: 1.7; white-space: pre-wrap; padding: 2px; }

        .song-info { text-align: center; margin-bottom: 12px; }
        .song-title { font-family: 'Fredoka', sans-serif; font-size: 1.62rem; font-weight: 700; color: var(--green); -webkit-text-stroke: .9px var(--stroke); }
        .song-artist { font-size: 1.02rem; color: #888; font-weight: bold; text-transform: uppercase; }

        .progress-bar-wrap { height: 14px; background: rgba(255,255,255,.8); border: var(--border); border-radius: 999px; cursor: pointer; overflow: hidden; margin-bottom: 6px; }
        .progress-fill { height: 100%; width: 0%; background: var(--orange); transition: width .1s linear; }

        .controls { display: flex; align-items: center; justify-content: space-between; padding: 0 2px; }
        .btn { background: none; border: none; cursor: pointer; font-size: 1.25rem; width: 44px; height: 44px; display: inline-flex; align-items: center; justify-content: center; }
        .play-btn { width: 78px; height: 78px; background: var(--green); border: var(--border); border-radius: 50%; font-size: 2rem; display: flex; justify-content: center; align-items: center; box-shadow: 5px 5px 0 var(--stroke); cursor: pointer; }

        .bottom-row { display: grid; grid-template-columns: 1fr auto; gap: 10px; }
        .action-btn { background: var(--card-solid); border: var(--border); padding: 13px 16px; border-radius: 999px; font-family: 'Patrick Hand', cursive; font-size: 1.15rem; font-weight: bold; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 9px; }

        .overlay { position: fixed; inset: 0; z-index: 99; background: rgba(0,0,0,.55); backdrop-filter: blur(8px); display: flex; justify-content: center; align-items: flex-end; opacity: 0; pointer-events: none; transition: opacity .25s ease; }
        .overlay.show { opacity: 1; pointer-events: auto; }
        .sheet { background: var(--card-solid); width: min(100%, 430px); max-height: 75vh; border: var(--border); border-radius: 28px 28px 20px 20px; padding: 20px 18px; transform: translateY(40px); transition: transform .3s ease; }
        .overlay.show .sheet { transform: translateY(0); }

        .plist { list-style: none; overflow-y: auto; max-height: 50vh; }
        .pitem { padding: 12px 10px; border-radius: 16px; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        .pitem.active { background: #e0f7ef; border: 2px solid var(--green); }

        .toast { position: fixed; left: 50%; bottom: 20px; transform: translate(-50%, 120%); background: #1a1a1a; color: #fff; padding: 12px 24px; border-radius: 999px; transition: 0.3s; opacity: 0; z-index: 1000; }
        .toast.show { transform: translate(-50%, 0); opacity: 1; }

        @media (max-width: 420px) { .bottom-row { grid-template-columns: 1fr; } .share-btn { display: none; } }
    </style>
</head>
<body>

<div class="bg"></div>
<div class="notes" id="notes"></div>

<div class="layout">
    <div class="top-bar">
        <div class="brand">
            <div class="brand-icon">
                <div class="wave-line w1"></div><div class="wave-line w2"></div><div class="wave-line w3"></div>
            </div>
            <div class="brand-name">Ispótifai</div>
        </div>
        <button class="install-chip hidden" id="install-btn">
            <i class="fa-solid fa-download"></i><span>Instalar</span>
        </button>
    </div>

    <div class="player-card">
        <div class="cover-area">
            <div class="ring" id="ring"></div>
            <div class="disc flat" id="disc">
                <div class="lyrics-panel" id="lyrics-panel">
                    <div class="lyrics-scroll" id="lyrics-text">Carregando...</div>
                    <button class="action-btn" id="close-lyrics" style="margin: 10px auto;">Fechar</button>
                </div>
                <img src="" alt="Capa" id="cover">
            </div>
        </div>

        <div class="song-info">
            <div class="song-title" id="song-title">Selecione uma música</div>
            <div class="song-artist" id="song-artist">Carimbozando</div>
        </div>

        <div class="progress-bar-wrap" id="prog-wrap">
            <div class="progress-fill" id="prog-fill"></div>
        </div>
        <div style="display:flex; justify-content: space-between; font-weight: bold; margin-bottom: 15px;">
            <span id="curr-time">0:00</span><span id="dur-time">0:00</span>
        </div>

        <div class="controls">
            <button class="btn" id="lyrics-btn"><i class="fas fa-comment-dots"></i></button>
            <button class="btn" id="btn-prev"><i class="fas fa-backward-step"></i></button>
            <button class="play-btn" id="btn-play"><i class="fas fa-play" id="play-icon"></i></button>
            <button class="btn" id="btn-next"><i class="fas fa-forward-step"></i></button>
            <button class="btn" id="btn-shuffle"><i class="fas fa-shuffle"></i></button>
        </div>
    </div>

    <div class="bottom-row">
        <button class="action-btn" id="playlist-btn"><i class="fas fa-list-music"></i> Músicas</button>
        <button class="action-btn share-btn" id="share-btn"><i class="fa-solid fa-share-nodes"></i></button>
    </div>
</div>

<div class="overlay" id="playlist-overlay">
    <div class="sheet">
        <h3 style="margin-bottom:15px; font-family: 'Fredoka';">Nossas Músicas</h3>
        <ul class="plist" id="plist-ul"></ul>
        <button class="action-btn" id="close-playlist" style="width:100%; margin-top:15px;">Fechar</button>
    </div>
</div>

<div class="toast" id="toast"></div>
<audio id="audio"></audio>

<script>
    const songs = [
        { title:"O Ofício de Ser", artist:"Carimbozando", src:"musicas/O Ofício de Ser.mp3", cover:"musicas/album_cover.png", lyrics:"musicas/O Ofício de Ser.txt" },
        { title:"A Dona do Mundo", artist:"Carimbozando", src:"musicas/A Dona do Mundo.mp3", cover:"musicas/album_cover.png", lyrics:"musicas/A Dona do Mundo.txt" },
        { title:"Onde o Sol se Demora", artist:"Carimbozando", src:"musicas/Onde o Sol se Demora.mp3", cover:"musicas/album_cover.png", lyrics:"musicas/Onde o Sol se Demora.txt" },
        { title:"O Rio que eu Era", artist:"Carimbozando", src:"musicas/O Rio que eu Era.mp3", cover:"musicas/album_cover.png", lyrics:"musicas/O Rio que eu Era.txt" },
        { title:"O Norte é o Adiante", artist:"Carimbozando", src:"musicas/O Norte é o Adiante.mp3", cover:"musicas/album_cover.png", lyrics:"musicas/O Norte é o Adiante.txt" }
    ];

    let idx = 0;
    const audio = document.getElementById('audio');
    const playBtn = document.getElementById('btn-play');
    const playIcon = document.getElementById('play-icon');
    const titleEl = document.getElementById('song-title');
    const coverEl = document.getElementById('cover');
    const progFill = document.getElementById('prog-fill');

    function loadSong(s) {
        titleEl.textContent = s.title;
        coverEl.src = s.cover;
        audio.src = s.src;
        fetch(s.lyrics).then(r => r.text()).then(t => document.getElementById('lyrics-text').textContent = t).catch(() => document.getElementById('lyrics-text').textContent = "Letra indisponível");
        renderPlaylist();
    }

    function togglePlay() {
        if (audio.paused) { audio.play(); playIcon.className = 'fas fa-pause'; }
        else { audio.pause(); playIcon.className = 'fas fa-play'; }
    }

    playBtn.addEventListener('click', togglePlay);
    document.getElementById('btn-next').addEventListener('click', () => { idx = (idx + 1) % songs.length; loadSong(songs[idx]); audio.play(); playIcon.className = 'fas fa-pause'; });
    document.getElementById('btn-prev').addEventListener('click', () => { idx = (idx - 1 + songs.length) % songs.length; loadSong(songs[idx]); audio.play(); playIcon.className = 'fas fa-pause'; });

    audio.addEventListener('timeupdate', () => {
        const pct = (audio.currentTime / audio.duration) * 100;
        progFill.style.width = pct + '%';
        document.getElementById('curr-time').textContent = Math.floor(audio.currentTime/60) + ":" + Math.floor(audio.currentTime%60).toString().padStart(2,'0');
    });

    function renderPlaylist() {
        const ul = document.getElementById('plist-ul');
        ul.innerHTML = '';
        songs.forEach((s, i) => {
            const li = document.createElement('li');
            li.className = 'pitem' + (i === idx ? ' active' : '');
            li.innerHTML = `<strong>${s.title}</strong>`;
            li.onclick = () => { idx = i; loadSong(songs[idx]); togglePlay(); document.getElementById('playlist-overlay').classList.remove('show'); };
            ul.appendChild(li);
        });
    }

    document.getElementById('playlist-btn').addEventListener('click', () => document.getElementById('playlist-overlay').classList.add('show'));
    document.getElementById('close-playlist').addEventListener('click', () => document.getElementById('playlist-overlay').classList.remove('show'));
    document.getElementById('lyrics-btn').addEventListener('click', () => document.getElementById('lyrics-panel').classList.add('show'));
    document.getElementById('close-lyrics').addEventListener('click', () => document.getElementById('lyrics-panel').classList.remove('show'));

    loadSong(songs[idx]);

    // Service Worker Register
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./service-worker.js');
        });
    }
</script>
</body>
</html>
